name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm + GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run e2e
        run: node scripts/test-init.js

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Note: 完整 learning history tarball 需要手动 attach 到 release
      # (源工程 F:/DreamRivakes2/ 不在 GitHub Actions 环境)
      - name: Create GitHub Release
        run: |
          gh release create ${GITHUB_REF#refs/tags/} \
            --title "${GITHUB_REF#refs/tags/}" \
            --notes-file CHANGELOG.md \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
