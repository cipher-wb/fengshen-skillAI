      - Mode E 19 例是真活技能（refs 跨度大）
      → refs 是表象，Mode 由 active/passive 字段定义本就互斥（不是切换）

  RQ-B8-2_subtype_long_tail:
    hypothesis: |
      SubType=1101 跨形态泛用（化身实战 vs 测试占位）→ 不是单一形态
      SubType=1001 corpus 仅 1 例（B-007 940107）→ 真长尾 / 可能 deprecated
      → SubType 长尾本身不是问题，每个 SubType 内部仍按 Mode + flags 分形态

  RQ-B8-3_unknown_morphology_extension:
    hypothesis: |
      70 例 UNKNOWN 可能再编码出 3 类候选：
      - type9_buff_meta_only（has_buff=true + 无驱动 + refs ≤ 15）
        预估 corpus 5-15 例（min_buff_meta + min_buff_no_drive 组）
      - type10_pure_placeholder（全 flag 0 + refs ≤ 5）
        预估 corpus 15-23 例（small_no_signals 组）
      - type11_event_only_listener（has_reg_event 单独 + 其他全 0）
        预估 corpus 3-8 例（mid_refs_unknown 组中 reg_event 子集）
      合计可再编码 23-46 例 → 覆盖率 65.7% → 77-88%（保守 70%-80%）
      但需 rule_4 严格：必须 .py 可重现 + 真新增字段判定

