  RQ-B8-1_mode_c_e_switch_condition:
    hypothesis: |
      Mode C/E 切换不由 refs 决定，由两个独立信号决定：
      （a）passive_root != 0 → Mode C（被动入口绑外部 buff_id）
      （b）SkillEffectFlowList_len > 0 → Mode E（顶层 fall-back flow）
      v0.7 D-603-R1 揭示 corpus refs 完全重叠的真因：
      - Mode C 164 例大量是 deprecated 老心法（refs 2-7 极小占位）+ 灵宠光环
