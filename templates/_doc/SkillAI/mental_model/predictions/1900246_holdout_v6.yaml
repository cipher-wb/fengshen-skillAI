# ===== 走 D-508 §0 决策树 =====
predict_decision_tree:
  step_1_has_SkillConfigNode: "是（推断）"
  reasoning_step_1: |
    skill_sub_type=1301 抽得到 = SkillConfigNode 顶层存在（即使 skill_id 字段命名不同 — 剧情技能可能有 _SkillID 别名等）
    虽然剧情技能目录罕见，但仍是类别 1 技能。

  step_2_subtype: 1301
  step_2_active_passive_inference: |
    ⚠️ 字典外 SubType — v0.6 字典 9 个未含 1301。但仍可走"先看 Active/Passive 再看 SubType"决策树：
    - has_register_event=False —— 不是 Mode E 典型 fall-back
    - 9 ORDER + 6 DELAY + 4 REPEAT —— 主流程控制原语 ORDER 高量，主入口非 0 概率高
    - has_create_role=True + has_add_force=True + bullet=1 + 5 PLAY_ROLE_ANIM ⭐ —— 主动激发 + 演出
    - 文件名"【剧情技能】" + indicator_type=1（单体指示器）—— 看起来像玩家释放的剧情技能（即使在剧情中也是主动模式）

    Mode 推测：**Mode A 纯 Active 优先**（has_register_event=False + ORDER 高量主动激发）
    Mode E 概率：**低**（5 PLAY_ROLE_ANIM 演出强 + 不像 fall-back 驱动）
    Mode B 候选：**中低**（剧情技能可能有击中后续演出 Passive，但 has_register_event=False 削弱）

  step_3_mode_prediction: "Mode A 纯 Active（高 confidence）"
