# ===== 4 维预测 =====
prediction:
  estimated_node_count: 60

  topology_sketch: |
    剧情技能 + 召唤+演出（推测 Mode A 纯 Active）：

    SkillConfig.Active(非 0) → ORDER_EXECUTE root (9 个 ORDER 中的最高层)
      → ModelConfig × 4 (4 召唤实体: 鹿 × N 或主角+鹿)
      → PLAY_ROLE_ANIM × 5 (剧情演出动作)
      → CreateRole (召唤鹿群实体)
      → ADD_FORCE (主角/鹿位移)
      → DELAY × 6 (剧情节奏锚点)
      → CREATE_EFFECT × 3 (春雪/木属性特效)
      → MODIFY_SKILL_TAG × 3 (剧情进度 tag 推进)
      → CREATE_BULLET × 1 (鹿群冲击主攻击子弹)
      → APPLY_SKILL_EFFECT (子弹命中后效果)
      → APPLY_ENTITY_EFFECT (鹿群消失 / 命中演出)
      → REPEAT_EXECUTE × 4 (鹿群多段连击)
    SkillConfig.Passive=0 (推测无被动响应)

  expected_templates:
    - "175xxx 子弹通用命中模板（bullet=1 + apply_skill_effect 高频）— 候选高"
    - "1900164xx 三联包（同 1900xxx 段位族 — 验证 D-503 跨剧情技能目录是否仍命中）"
